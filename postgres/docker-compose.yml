services:
  postgres:
    image: postgres:16-alpine
    container_name: de_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: analytics_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  superset:
    image: apache/superset:latest
    container_name: de_superset
    restart: always
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "super_secret_key_for_data_engineering_project_2026"
    depends_on:
      - postgres

volumes:
  pg_data:
